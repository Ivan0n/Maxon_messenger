<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Courier New', monospace;
    background: #000;
    color: #fff;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .chat-container {
    width: 420px;
    height: 600px;
    border: 2px solid #fff;
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 2px solid #fff;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-align: center;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 75%;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.4;
  }

  .message.incoming {
    align-self: flex-start;
    border: 1px solid #fff;
  }

  .message.outgoing {
    align-self: flex-end;
    background: #fff;
    color: #000;
  }

  .message .time {
    font-size: 10px;
    margin-top: 6px;
    opacity: 0.5;
    text-align: right;
  }

  .chat-input {
    border-top: 2px solid #fff;
    display: flex;
  }

  .chat-input input {
    flex: 1;
    padding: 14px 16px;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
  }

  .chat-input input::placeholder {
    color: #555;
  }

  .chat-input button {
    padding: 14px 20px;
    background: #fff;
    color: #000;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: background 0.2s;
  }

  .chat-input button:hover {
    background: #ccc;
  }

  .chat-messages::-webkit-scrollbar {
    width: 4px;
  }

  .chat-messages::-webkit-scrollbar-track {
    background: #000;
  }

  .chat-messages::-webkit-scrollbar-thumb {
    background: #fff;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">чат</div>

  <div class="chat-messages" id="messages">
    <div class="message incoming">
      привет, как дела?
      <div class="time">12:01</div>
    </div>
    <div class="message outgoing">
      норм, а у тебя?
      <div class="time">12:02</div>
    </div>
    <div class="message incoming">
      тоже ничего, чё делаешь
      <div class="time">12:02</div>
    </div>
    <div class="message outgoing">
      заглушку пилю
      <div class="time">12:03</div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="input" placeholder="напиши что-нибудь..." autocomplete="off">
    <button id="send">→</button>
  </div>
</div>



</body>
</html>
